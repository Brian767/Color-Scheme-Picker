<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Color Scheme Picker</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1 id="title">Color Scheme Picker</h1>
    <main id="main-container">
      <form id="color-form">
        <input
          class="pointer"
          type="color"
          id="color-seed"
          name="color-seed"
          value="#6895df"
        />
        <select
          class="pointer"
          id="color-scheme-options"
          name="color-scheme-options"
        >
          <option value="monochrome">Monochrome</option>
          <option value="monochrome-dark">Monochrome-dark</option>
          <option value="monochrome-light">Monochrome-light</option>
          <option value="analogic">Analogic</option>
          <option value="complement">Complement</option>
          <option value="analogic-complement">Analogic-complement</option>
          <option value="triad">Triad</option>
        </select>
        <button id="get-color-scheme" class="pointer" type="submit">
          Get color scheme
        </button>
      </form>
      <div id="color-scheme-container">
        <div class="color-scheme" id="color-1"></div>
        <div class="color-scheme" id="color-2"></div>
        <div class="color-scheme" id="color-3"></div>
        <div class="color-scheme" id="color-4"></div>
        <div class="color-scheme" id="color-5"></div>
      </div>
      <div id="color-scheme-hex-container">
        <div class="color-scheme-hex" id="color-hex-1">#2555A2</div>
        <div class="color-scheme-hex" id="color-hex-2">#2E6ACD</div>
        <div class="color-scheme-hex" id="color-hex-3">#5386DA</div>
        <div class="color-scheme-hex" id="color-hex-4">#7DA4E4</div>
        <div class="color-scheme-hex" id="color-hex-5">#A6C1ED</div>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
